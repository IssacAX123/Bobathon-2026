# Package Keyword Mappings Configuration
# 
# This file maps natural language keywords to Liberty packages.
# Add new mappings as you discover common terms in GitHub issues.
#
# Format:
#   keyword:
#     - package: full.package.name
#       confidence: 0.0-1.0
#       context: Description of what this package does
#       type: LIBERTY or IBM

# Security & Authentication
